apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: additional-networks
spec:
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  desiredState:
    interfaces:
    - name: br-native  # to access public IPs on vlan 127
      type: linux-bridge
      state: up
      ipv4: {enabled: false}
      ipv6: {enabled: false}
      bridge:
        options:
          stp:
            enabled: false
        port:
        - name: ens3f0np0
    - name: vlan911
      type: vlan
      state: up
      vlan:
        base-iface: ens3f0np0
        id: 911
    - name: br911
      type: linux-bridge
      state: up
      ipv4: {enabled: false}
      ipv6: {enabled: false}
      bridge:
        options:
          stp:
            enabled: false
        port:
        - name: vlan911
    - name: vlan215
      type: vlan
      state: up
      vlan:
        base-iface: ens3f0np0
        id: 215
    - name: br215
      type: linux-bridge
      state: up
      ipv4: {enabled: false}
      ipv6: {enabled: false}
      bridge:
        options:
          stp:
            enabled: false
        port:
        - name: vlan215
