apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    "kubevirt.io/vm-delete-protection": "True"
  name: lenovo-vm
spec:
  runStrategy: Always
  template:
    spec:
      evictionStrategy: LiveMigrate
      domain:
        devices:
          interfaces:
          - name: default
            masquerade: {}
          - name: neu-public
            bridge: {}
          - name: ipmi-vlan-911
            bridge: {}
          disks:
          - name: boot-disk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
        cpu:
          sockets: 1
          cores: 4
          threads: 1
        resources:
          requests:
            memory: 8Gi
            cpu: 1
          limits:
            memory: 9Gi
            cpu: 4
      networks:
      - name: default
        pod: {}
      - name: neu-public
        multus:
          networkName: infrastructure-vms/vlan127-no-ipam
      - name: ipmi-vlan-911
        multus:
          networkName: infrastructure-vms/vlan911-no-ipam
      volumes:
      - name: boot-disk
        dataVolume:
          name: lenovo-vm-rootdisk
      - name: cloudinitdisk
        cloudInitNoCloud:
          networkData: |
            version: 2
            ethernets:
              eth0:
                dhcp4: true
                dhcp4-overrides:
                  route-metric: 200
                routes:
                  - to: 10.128.0.0/14
                    via: 10.0.2.1
                    metric: 50
              eth1:
                addresses:
                - 129.10.5.118/24
                gateway4: 129.10.5.1
                nameservers:
                  addresses: [8.8.8.8]
              eth2:
                dhcp4: true
                dhcp4-overrides:
                  route-metric: 300
          userData: |
            #cloud-config
            ssh_authorized_keys:
              - ssh-rsa 
              - ssh-rsa 
