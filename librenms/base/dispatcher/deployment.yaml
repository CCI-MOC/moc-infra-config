apiVersion: apps/v1
kind: Deployment
metadata:
  name: librenms-dispatcher
spec:
  replicas: 1
  template:
    spec:
      enableServiceLinks: false
      serviceAccountName: librenms-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: librenms
          image: docker.io/librenms/librenms:26.2.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1024Mi
          securityContext:
            capabilities:
              add:
              - "NET_ADMIN"
              - "NET_RAW"
          envFrom:
            - configMapRef:
                name: librenms-config
            - secretRef:
                name: librenms-secrets
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: librenms-config
                  key: MYSQL_DATABASE
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: librenms-config
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: librenms-secrets
                  key: MYSQL_PASSWORD
            - name: SIDECAR_DISPATCHER
              value: "1"
            - name: DISPATCHER_NODE_ID
              value: "dispatcher1"
          volumeMounts:
            - name: librenms-data
              mountPath: /data
            - name: rrdcached-db
              mountPath: /data/rrd
      volumes:
        - name: librenms-data
          persistentVolumeClaim:
            claimName: librenms-data
        - name: rrdcached-db
          persistentVolumeClaim:
            claimName: rrdcached-db
