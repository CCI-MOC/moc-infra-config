apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: librenms
spec:
  serviceName: mariadb
  replicas: 1
  template:
    spec:
      containers:
      - args:
        - --innodb-file-per-table=1
        - --lower-case-table-names=0
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
        envFrom:
        - configMapRef:
            name: librenms-config
        - secretRef:
            name: librenms-secrets
        image: docker.io/mariadb:10
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2024Mi
        name: mariadb
        volumeMounts:
        - mountPath: /var/lib/mysql
          name: db-data
  volumeClaimTemplates:
  - metadata:
      name: db-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
